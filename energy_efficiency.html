        const fetchEiaPrices = async (state) => {
            if (!EIA_API_KEY || EIA_API_KEY.includes('PLACEHOLDER')) return null;
            
            const results = { electricity: null, gas: null, oil: null, propane: null };

            try {
                // 1. Electricity Price (cents/kWh -> $/kWh)
                const elecUrl = `https://api.eia.gov/v2/electricity/retail-sales/data/?api_key=${EIA_API_KEY}&frequency=monthly&data[0]=price&facets[sectorid][]=RES&facets[stateid][]=${state}&sort[0][column]=period&sort[0][direction]=desc&length=1`;
                const elecRes = await fetch(elecUrl);
                if (!elecRes.ok) throw new Error(`EIA Elec failed: ${elecRes.status}`);
                const elecData = await elecRes.json();
                if (elecData.response.data.length > 0) {
                    results.electricity = parseFloat(elecData.response.data[0].price) / 100;
                }

                // 2. Natural Gas Price ($/kcf -> $/therm) - 1 kcf approx 10.37 therms
                // Note: duoarea is the correct facet name for v2 natural-gas
                const gasUrl = `https://api.eia.gov/v2/natural-gas/pri/sum/data/?api_key=${EIA_API_KEY}&frequency=monthly&data[0]=value&facets[process][]=PRS&facets[duoarea][]=S${state}&sort[0][column]=period&sort[0][direction]=desc&length=1`;
                const gasRes = await fetch(gasUrl);
                if (!gasRes.ok) throw new Error(`EIA Gas failed: ${gasRes.status}`);
                const gasData = await gasRes.json();
                if (gasData.response.data.length > 0) {
                    results.gas = parseFloat(gasData.response.data[0].value) / 10.37;
                }

                // 3. Heating Oil Price ($/gal)
                // Note: petroleum/pri/wfr is the correct route for weekly heating oil
                const oilUrl = `https://api.eia.gov/v2/petroleum/pri/wfr/data/?api_key=${EIA_API_KEY}&frequency=weekly&data[0]=value&facets[product][]=EPD2F&facets[process][]=PRS&facets[duoarea][]=S${state}&sort[0][column]=period&sort[0][direction]=desc&length=1`;
                const oilRes = await fetch(oilUrl);
                if (!oilRes.ok) throw new Error(`EIA Oil failed: ${oilRes.status}`);
                const oilData = await oilRes.json();
                if (oilData.response.data.length > 0) {
                    results.oil = parseFloat(oilData.response.data[0].value);
                }

                // 4. Propane Price ($/gal)
                const propaneUrl = `https://api.eia.gov/v2/petroleum/pri/wfr/data/?api_key=${EIA_API_KEY}&frequency=weekly&data[0]=value&facets[product][]=EPLLPA&facets[process][]=PRS&facets[duoarea][]=S${state}&sort[0][column]=period&sort[0][direction]=desc&length=1`;
                const proRes = await fetch(propaneUrl);
                if (!proRes.ok) throw new Error(`EIA Propane failed: ${proRes.status}`);
                const proData = await proRes.json();
                if (proData.response.data.length > 0) {
                    results.propane = parseFloat(proData.response.data[0].value);
                }
            } catch (err) {
                // Sanitize error to prevent key exposure in logs
                const msg = err.message ? err.message.replace(/api_key=[^&]*/g, 'api_key=REDACTED') : "EIA Fetch Error";
                console.error("EIA Price Fetch Error:", msg);
            }
            return results;
        };

        const getCOP = (temp, curve) => {
            if (!curve || curve.length === 0) return 1.0;
            if (temp <= curve[0].t) return curve[0].cop;
            if (temp >= curve[curve.length - 1].t) return curve[curve.length - 1].cop;
            for (let i = 0; i < curve.length - 1; i++) {
                if (temp >= curve[i].t && temp <= curve[i + 1].t) {
                    const t1 = curve[i].t, t2 = curve[i + 1].t, cop1 = curve[i].cop, cop2 = curve[i + 1].cop;
                    return Math.max(1.0, cop1 + (cop2 - cop1) * ((temp - t1) / (t2 - t1)));
                }
            }
            return 1.0;
        };

            const [internalGains, setInternalGains] = useState(600);

            const [applyHpDiscount, setApplyHpDiscount] = useState(false);
            const [hpDiscount, setHpDiscount] = useState(0.073);

            const [outTemp, setOutTemp] = useState(30);            const [cacheSize, setCacheSize] = useState(0);

            const isFossilFuel = primaryHeating === 'gas' || primaryHeating === 'oil' || primaryHeating === 'propane';

            useEffect(() => { setInternalGains(DEFAULT_GAINS_BY_SIZE[homeSize]); }, [homeSize]);
            useEffect(() => { if (!changeSetpoint) setUpgradedSetpoint(heatingSetpoint - 2); }, [heatingSetpoint]);
            useEffect(() => { setUpgradedEfficiency(Math.min(96, efficiency * 1.05)); }, [efficiency]);

            // --- Helpers ---
            const parseNrelCSV = (csvText) => {
                if (!csvText) {
                    console.error("CSV text is empty");
                    return { error: "Received empty data from NREL" };
                }
                const lines = csvText.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length < 2) {
                    console.error("CSV has too few lines");
                    return { error: "NREL data format is invalid (too few lines)" };
                }
                
                // Find the header line (starts with Year,Month or contains temperature)
                let headerIdx = -1;
                for (let i = 0; i < Math.min(10, lines.length); i++) {
                    const l = lines[i].toLowerCase();
                    if (l.includes('year') && l.includes('month') && l.includes('temperature')) {
                        headerIdx = i;
                        break;
                    }
                }
                
                if (headerIdx === -1) {
                    // Fallback: assume line 2 (3rd line) is headers if it looks like data headers
                    if (lines.length > 2 && lines[2].toLowerCase().includes('temperature')) {
                        headerIdx = 2;
                    } else {
                        console.error("Could not find header row in NREL data");
                        return { error: "Could not find Temperature column in NREL data" };
                    }
                }

                const headers = lines[headerIdx].split(',');
                const tempIdx = headers.findIndex(h => h.trim().toLowerCase() === 'temperature');
                if (tempIdx === -1) {
                    console.error("Could not find Temperature column index");
                    return { error: "Temperature column missing from NREL data" };
                }

                const dataLines = lines.slice(headerIdx + 1);
                const bins = {};
                for (let i = -50; i <= 125; i++) bins[i] = 0;

                let validPoints = 0;
                dataLines.forEach(line => {
                    const parts = line.split(',');
                    if (parts.length > tempIdx) {
                        const tempC = parseFloat(parts[tempIdx]);
                        if (!isNaN(tempC)) {
                            const tempF = Math.round(tempC * 9/5 + 32);
                            if (tempF >= -50 && tempF <= 125) {
                                bins[tempF]++;
                                validPoints++;
                            }
                        }
                    }
                });
                
                if (validPoints === 0) {
                    console.error("No valid temperature data points found in", dataLines.length, "data lines");
                    return { error: "No valid temperature data found in NREL file" };
                }

                const result = [];
                for (let i = -20; i <= 75; i++) {
                    result.push({ temp: i, hours: bins[i] || 0 });
                }
                return { data: result };
            };

            // --- Calculations ---
            const currentUA = useMemo(() => UA_BASE_BY_SIZE[homeSize] * UA_MULTIPLIER_BY_INSULATION[homeInsulation], [homeSize, homeInsulation]);
            const upgradedUA = useMemo(() => {
                const insul = upgradeWeatherization ? upgradeInsulationType : homeInsulation;
                return UA_BASE_BY_SIZE[homeSize] * UA_MULTIPLIER_BY_INSULATION[insul];
            }, [homeSize, upgradeWeatherization, upgradeInsulationType, homeInsulation]);

            const activeCurve = useMemo(() => COP_PROFILES[hpProfileId].curve, [hpProfileId]);
            const currentCOP = useMemo(() => getCOP(outTemp, activeCurve), [outTemp, activeCurve]);
            const effectiveElecPrice = Math.max(0, elecPrice - (applyHpDiscount ? hpDiscount : 0));
            
            const oilCostAtEfficiency = useCallback((eff) => oilPrice / (KWH_PER_GALLON_OIL * (eff / 100)), [oilPrice]);
            const gasCostAtEfficiency = useCallback((eff) => gasPrice / (KWH_PER_THERM_GAS * (eff / 100)), [gasPrice]);
            const propaneCostAtEfficiency = useCallback((eff) => propanePrice / (KWH_PER_GALLON_PROPANE * (eff / 100)), [propanePrice]);

            const getLoadAtTemp = useCallback((t, ua, setpoint) => {
                const gainsKw = internalGains / 1000;
                const grossLoad = Math.max(0, (setpoint - t) * ua);
                return Math.max(0, grossLoad - gainsKw);
            }, [internalGains]);

            const balancePoint = useMemo(() => heatingSetpoint - ((internalGains / 1000) / currentUA), [heatingSetpoint, internalGains, currentUA]);

            const isUsingFallback = !fetchedBinData;

            const binData = useMemo(() => {
                if (fetchedBinData) {
                    return fetchedBinData.map(d => ({
                        temp: d.temp,
                        hours: d.temp >= balancePoint ? 0 : d.hours
                    }));
                }
                const data = [];
                const isMA_inner = activeZipCode.startsWith('01') || activeZipCode.startsWith('02');
                for (let t = -20; t <= 75; t++) {
                    // Optimized Gaussian peaks: 140 for MA (~5600 HDD), 110 for Nat'l (~4000 HDD)
                    const hours = t >= balancePoint ? 0 : (isMA_inner ? 140 * Math.exp(-Math.pow(t - 38, 2) / 400) : 110 * Math.exp(-Math.pow(t - 45, 2) / 300));
                    data.push({ temp: t, hours: Math.round(hours) });
                }
                return data;
            }, [activeZipCode, balancePoint, fetchedBinData]);

            const annualCosts = useMemo(() => {
                let hpTotal = 0, oilTotal = 0, gasTotal = 0, propaneTotal = 0, electricTotal = 0;
                binData.forEach(d => {
                    if (d.hours <= 0) return;
                    const load = getLoadAtTemp(d.temp, currentUA, heatingSetpoint);
                    const kwh = load * d.hours;
                    hpTotal += kwh * (effectiveElecPrice / getCOP(d.temp, activeCurve));
                    oilTotal += kwh * oilCostAtEfficiency(efficiency);
                    gasTotal += kwh * gasCostAtEfficiency(efficiency);
                    propaneTotal += kwh * propaneCostAtEfficiency(efficiency);
                    electricTotal += kwh * effectiveElecPrice;
                });
                return { hp: hpTotal, oil: oilTotal, gas: gasTotal, propane: propaneTotal, electric: electricTotal };
            }, [binData, getLoadAtTemp, currentUA, heatingSetpoint, effectiveElecPrice, efficiency, activeCurve, oilCostAtEfficiency, gasCostAtEfficiency, propaneCostAtEfficiency]);

            const upgradedAnnualCosts = useMemo(() => {
                let hpTotal = 0, oilTotal = 0, gasTotal = 0, propaneTotal = 0, electricTotal = 0;
                const baselineForUpgrades = changeSetpoint ? upgradedSetpoint : heatingSetpoint;
                const setpointEffective = useSmartThermostat ? baselineForUpgrades - (2 * awayHours / 24) : baselineForUpgrades;
                const effEffective = furnaceTuneUp ? upgradedEfficiency : efficiency;
                const curveUpgrade = COP_PROFILES[addHP ? upgradeHpProfileId : hpProfileId].curve;

                binData.forEach(d => {
                    if (d.hours <= 0) return;
                    const load = getLoadAtTemp(d.temp, upgradedUA, setpointEffective);
                    if (load <= 0) return;
                    const kwh = load * d.hours;
                    hpTotal += kwh * (effectiveElecPrice / getCOP(d.temp, curveUpgrade));
                    oilTotal += kwh * oilCostAtEfficiency(effEffective);
                    gasTotal += kwh * gasCostAtEfficiency(effEffective);
                    propaneTotal += kwh * propaneCostAtEfficiency(effEffective);
                    electricTotal += kwh * effectiveElecPrice;
                });
                return { hp: hpTotal, oil: oilTotal, gas: gasTotal, propane: propaneTotal, electric: electricTotal };
            }, [binData, getLoadAtTemp, upgradedUA, heatingSetpoint, changeSetpoint, upgradedSetpoint, awayHours, useSmartThermostat, furnaceTuneUp, upgradedEfficiency, efficiency, addHP, upgradeHpProfileId, hpProfileId, effectiveElecPrice, oilCostAtEfficiency, gasCostAtEfficiency, propaneCostAtEfficiency]);

            const maxAnnualCost = Math.max(annualCosts.hp, annualCosts.oil, annualCosts.gas, annualCosts.propane, annualCosts.electric);

            const costBars = useMemo(() => {
                const hpModelName = COP_PROFILES[hpProfileId].name;
                const bars = [
                    { id: 'hp', label: `Heat Pump (${hpModelName})`, cost: annualCosts.hp, iconName: 'Zap', colorClass: 'bg-blue-500' },
                    { id: 'oil', label: 'Heating Oil', cost: annualCosts.oil, iconName: 'Droplet', colorClass: 'bg-slate-500' },
                    { id: 'gas', label: 'Natural Gas', cost: annualCosts.gas, iconName: 'Flame', colorClass: 'bg-red-500' },
                    { id: 'propane', label: 'Propane', cost: annualCosts.propane, iconName: 'Flame', colorClass: 'bg-orange-500' },
                    { id: 'electric', label: 'Electric Resistance', cost: annualCosts.electric, iconName: 'Zap', colorClass: 'bg-purple-500' }
                ];
                return bars.sort((a, b) => a.cost - b.cost);
            }, [annualCosts, hpProfileId]);

            const targetUpgradeBar = useMemo(() => {
                const systemId = addHP ? 'hp' : primaryHeating;
                const modelName = COP_PROFILES[addHP ? upgradeHpProfileId : hpProfileId].name;
                const bars = {
                    hp: { id: 'hp', label: `Heat Pump (${modelName})`, cost: upgradedAnnualCosts.hp, iconName: 'Zap', colorClass: 'bg-blue-500' },
                    oil: { id: 'oil', label: 'Heating Oil', cost: upgradedAnnualCosts.oil, iconName: 'Droplet', colorClass: 'bg-slate-500' },
                    gas: { id: 'gas', label: 'Natural Gas', cost: upgradedAnnualCosts.gas, iconName: 'Flame', colorClass: 'bg-red-500' },
                    propane: { id: 'propane', label: 'Propane', cost: upgradedAnnualCosts.propane, iconName: 'Flame', colorClass: 'bg-orange-500' },
                    electric: { id: 'electric', label: 'Electric Resistance', cost: upgradedAnnualCosts.electric, iconName: 'Zap', colorClass: 'bg-purple-500' }
                };
                return bars[systemId];
            }, [upgradedAnnualCosts, addHP, upgradeHpProfileId, hpProfileId, primaryHeating]);

            const upgradeFinancials = useMemo(() => {
                let upfront = 0, recurring = 0;
                const items = [];
                if (furnaceTuneUp) { recurring += 150; items.push({ name: "Annual Furnace Tune-up", cost: 150, period: "year" }); }
                if (useSmartThermostat) { upfront += 250; items.push({ name: "Smart Thermostat", cost: 250, period: "upfront" }); }
                if (useWeatherAware) { upfront += 100; items.push({ name: "Weather-Aware Expansion", cost: 100, period: "upfront" }); }
                if (addHP) {
                    const base = { small: 12000, medium: 18000, large: 28000 }[homeSize];
                    const mult = upgradeHpProfileId === 'high' ? 1.3 : (upgradeHpProfileId === 'medium' ? 1.1 : 1.0);
                    upfront += base * mult; items.push({ name: "Heat Pump HVAC", cost: base * mult, period: "upfront" });
                }
                if (upgradeWeatherization) {
                    const levels = { poor: 0, average: 1, excellent: 2 };
                    const diff = levels[upgradeInsulationType] - levels[homeInsulation];
                    if (diff > 0) {
                        const cost = diff * 3500 * ({ small: 0.7, medium: 1, large: 1.5 }[homeSize]);
                        upfront += cost; items.push({ name: "Building Weatherization", cost: cost, period: "upfront" });
                    }
                }
                return { upfront, recurring, items };
            }, [furnaceTuneUp, useSmartThermostat, useWeatherAware, addHP, homeSize, upgradeHpProfileId, upgradeWeatherization, upgradeInsulationType, homeInsulation]);

            const graphData_Across = useMemo(() => {
                const data = [];
                for (let t = -20; t <= 65; t += 5) {
                    data.push({ temp: t, hp: effectiveElecPrice / getCOP(t, activeCurve), oil: oilCostAtEfficiency(efficiency), gas: gasCostAtEfficiency(efficiency) });
                }
                return data;
            }, [effectiveElecPrice, efficiency, activeCurve, oilCostAtEfficiency, gasCostAtEfficiency]);

            const hpVsGasBalance = useMemo(() => {
                // Check from coldest to warmest to find where HP becomes cheaper than Gas
                // If Gas is cheaper even at 75F, balance is > Setpoint
                const temps = [];
                for (let t = -20; t <= 75; t++) temps.push(t);

                const firstHPCheaper = temps.find(t => (effectiveElecPrice / getCOP(t, activeCurve)) <= gasCostAtEfficiency(efficiency));
                if (firstHPCheaper === undefined) return `> ${heatingSetpoint}`; // HP is never cheaper
                if (firstHPCheaper <= -20) return "< -20"; // HP is always cheaper
                return firstHPCheaper;
            }, [effectiveElecPrice, efficiency, activeCurve, gasCostAtEfficiency, heatingSetpoint]);

            const hpVsOilBalance = useMemo(() => {
                const temps = [];
                for (let t = -20; t <= 75; t++) temps.push(t);

                const firstHPCheaper = temps.find(t => (effectiveElecPrice / getCOP(t, activeCurve)) <= oilCostAtEfficiency(efficiency));
                if (firstHPCheaper === undefined) return `> ${heatingSetpoint}`;
                if (firstHPCheaper <= -20) return "< -20";
                return firstHPCheaper;
            }, [effectiveElecPrice, efficiency, activeCurve, oilCostAtEfficiency, heatingSetpoint]);

            const hpVsPropaneBalance = useMemo(() => {
                const temps = [];
                for (let t = -20; t <= 75; t++) temps.push(t);

                const firstHPCheaper = temps.find(t => (effectiveElecPrice / getCOP(t, activeCurve)) <= propaneCostAtEfficiency(efficiency));
                if (firstHPCheaper === undefined) return `> ${heatingSetpoint}`;
                if (firstHPCheaper <= -20) return "< -20";
                return firstHPCheaper;
            }, [effectiveElecPrice, efficiency, activeCurve, propaneCostAtEfficiency, heatingSetpoint]);

            const hpCheaperPercentage = useMemo(() => {
                let totalHeatingHours = 0;
                let hpCheaperHours = 0;
                binData.forEach(d => {
                    if (d.hours > 0) {
                        totalHeatingHours += d.hours;
                        const hpCost = effectiveElecPrice / getCOP(d.temp, activeCurve);
                        const oilCost = oilCostAtEfficiency(efficiency);
                        const gasCost = gasCostAtEfficiency(efficiency);
                        const propaneCost = propaneCostAtEfficiency(efficiency);
                        if (hpCost < oilCost && hpCost < gasCost && hpCost < propaneCost) {
                            hpCheaperHours += d.hours;
                        }
                    }
                });
                return totalHeatingHours > 0 ? Math.round((hpCheaperHours / totalHeatingHours) * 100) : 0;
            }, [binData, activeCurve, effectiveElecPrice, efficiency, oilCostAtEfficiency, gasCostAtEfficiency, propaneCostAtEfficiency]);

            // --- Handlers ---
            const clearCache = () => {
                Object.keys(localStorage).forEach(k => {
                    if (k.startsWith('tmy_v4_')) localStorage.removeItem(k);
                });
                setCacheSize(0);
                alert("Cache cleared");
            };

            const handleZipLookup = async (e, useProxy = true, forceRefresh = false) => {
                // Sanitize and Validate
                const cleanZip = zipCode.trim().replace(/\D/g, '');
                if (cleanZip.length !== 5) {
                    setLookupMessage("Error: Please enter a valid 5-digit ZIP code.");
                    return;
                }
                
                const applyRates = (state, prices = null, source = 'regional') => {
                    const prefix = cleanZip.substring(0, 2);
                    // 1. Initial Regional Defaults
                    if (state === 'MA' || prefix === '01' || prefix === '02') {
                        setElecPrice(0.33); setOilPrice(4.10); setGasPrice(1.80); setPropanePrice(3.50);
                        setApplyHpDiscount(true); setHpDiscount(0.073);
                    } else if (['NH', 'ME', 'VT', 'CT', 'RI'].includes(state)) {
                        setElecPrice(0.28); setOilPrice(4.00); setGasPrice(1.70); setPropanePrice(3.40);
                        setApplyHpDiscount(false);
                    } else {
                        setElecPrice(0.16); setOilPrice(3.80); setGasPrice(1.40); setPropanePrice(3.20);
                        setApplyHpDiscount(false);
                    }

                    // 2. Override with specific prices if provided
                    if (prices) {
                        if (prices.electricity) setElecPrice(Number(prices.electricity.toFixed(3)));
                        if (prices.gas) setGasPrice(Number(prices.gas.toFixed(2)));
                        if (prices.oil) setOilPrice(Number(prices.oil.toFixed(2)));
                        if (prices.propane) setPropanePrice(Number(prices.propane.toFixed(2)));
                    }
                    setPriceSource(source);
                };

                // 0. Check Cache
                const cacheKey = `tmy_v4_${cleanZip}`;
                if (!forceRefresh) {
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) {
                        try {
                            const parsed = JSON.parse(cached);
                            // Handle both old (array) and new (object) cache formats
                            const binned = Array.isArray(parsed) ? parsed : parsed.binnedData;
                            const eiaPrices = parsed.eiaPrices || null;
                            const source = parsed.priceSource || 'regional';
                            
                            setFetchedBinData(binned);
                            setActiveZipCode(cleanZip);
                            setZipCode(cleanZip);
                            
                            const prefix = cleanZip.substring(0, 2);
                            const stateCode = ZIP_TO_STATE[prefix];
                            applyRates(stateCode, eiaPrices, source);

                            setLookupMessage(`Loaded data for ${cleanZip} from local cache.`);
                            setCurrentView(2);
                            return;
                        } catch (e) {
                            console.error("Cache parse failed:", e);
                        }
                    }
                }

                setIsLoadingData(true);
                setLoadProgress(5);
                setLookupMessage(useProxy ? "Geolocating ZIP code..." : "Geolocating ZIP code (direct)...");
                setActiveZipCode(cleanZip);
                setZipCode(cleanZip);

                // Simulated progress timer
                const progressInterval = setInterval(() => {
                    setLoadProgress(prev => {
                        if (prev >= 90) return prev;
                        return prev + (prev < 40 ? 5 : (prev < 70 ? 2 : 1));
                    });
                }, 400);

                try {
                    // 1. Geolocate ZIP to Lat/Lon
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${cleanZip}&country=US&format=json`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    const geoData = await geoRes.json();
                    if (!geoData || geoData.length === 0) throw new Error("ZIP code not found");
                    const { lat, lon } = geoData[0];
                    setLoadProgress(20);

                    // 2. Fetch climate data
                    setLookupMessage("Fetching 2025 climate data...");
                    const omApiUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2025-01-01&end_date=2025-12-31&hourly=temperature_2m`;
                    
                    let omData = null;
                    const startTime = Date.now();
                    const tryFetch = async (url, type) => {
                        const res = await fetch(url);
                        if (!res.ok) throw new Error(`${type} fetch failed: ${res.status}`);
                        return await res.json();
                    };

                    try {
                        omData = await tryFetch(omApiUrl, "Direct");
                    } catch (e1) {
                        setLookupMessage("Fetching data (via proxy)...");
                        const proxyA = `https://api.allorigins.win/get?url=${encodeURIComponent(omApiUrl)}`;
                        const resp = await tryFetch(proxyA, "Proxy");
                        omData = JSON.parse(resp.contents);
                    }
                    
                    if (!omData || !omData.hourly || !omData.hourly.temperature_2m) throw new Error("Invalid weather data");

                    setLoadProgress(80);

                    // 3. Process Climate Data into bins
                    const temperatures = omData.hourly.temperature_2m;
                    const bins = {};
                    for (let i = -50; i <= 125; i++) bins[i] = 0;
                    temperatures.forEach(tempC => {
                        const tempF = Math.round(tempC * 9/5 + 32);
                        if (tempF >= -50 && tempF <= 125) bins[tempF]++;
                    });
                    const binnedData = [];
                    for (let i = -20; i <= 75; i++) binnedData.push({ temp: i, hours: bins[i] || 0 });
                    setFetchedBinData(binnedData);

                    // 4. Fetch EIA Prices
                    const prefix = cleanZip.substring(0, 2);
                    const stateCode = ZIP_TO_STATE[prefix];
                    let eiaPricesResults = null;
                    let detectedPriceSource = 'regional';

                    if (stateCode) {
                        setLookupMessage(`Fetching latest ${stateCode} energy prices...`);
                        try {
                            eiaPricesResults = await fetchEiaPrices(stateCode);
                            if (eiaPricesResults && (eiaPricesResults.electricity || eiaPricesResults.gas || eiaPricesResults.oil || eiaPricesResults.propane)) {
                                detectedPriceSource = 'eia';
                            }
                        } catch (eiaErr) {
                            console.warn("EIA fetch failed", eiaErr);
                        }
                    }

                    applyRates(stateCode, eiaPricesResults, detectedPriceSource);

                    // 5. Save to Cache
                    const cacheData = {
                        binnedData: binnedData,
                        eiaPrices: eiaPricesResults,
                        priceSource: detectedPriceSource,
                        timestamp: Date.now()
                    };
                    localStorage.setItem(cacheKey, JSON.stringify(cacheData));
                    const count = Object.keys(localStorage).filter(k => k.startsWith('tmy_v4_')).length;
                    setCacheSize(count);

                    setLoadProgress(100);
                    setLookupMessage(`Data for ${cleanZip} loaded successfully.`);
                    setCurrentView(2);
                } catch (err) {
                    console.error("Lookup failed:", err);
                    setLookupMessage(`Error: ${err.message}. Please check your ZIP code and try again.`);
                    setFetchedBinData(null);
                    setActiveZipCode(''); // Clear active ZIP so indicators hide
                    // Do NOT switch to view 2 on failure
                } finally {
                    clearInterval(progressInterval);
                    setIsLoadingData(false);
                }
            };

            const handleSystemChange = (val) => {
                if (val.startsWith('hp-')) {
                    setPrimaryHeating('hp');
                    setHpProfileId(val.replace('hp-', ''));
                } else {
                    setPrimaryHeating(val);
                }
            };

            const handleDrag = useCallback((clientX) => {
                if (!svgRef.current) return;
                const rect = svgRef.current.getBoundingClientRect();
                const svgX = ((clientX - rect.left) / rect.width) * GRAPH_WIDTH;
                const innerWidth = GRAPH_WIDTH - GRAPH_PADDING.left - GRAPH_PADDING.right;
                let newTemp = Math.round(X_MIN + ((svgX - GRAPH_PADDING.left) / innerWidth) * (X_MAX - X_MIN));
                setOutTemp(Math.max(X_MIN, Math.min(X_MAX, newTemp)));
            }, []);

            const currentSystemVal = primaryHeating === 'hp' ? `hp-${hpProfileId}` : primaryHeating;
            const systemIcon = primaryHeating === 'hp' ? 'ThermometerSnowflake' : (primaryHeating === 'electric' ? 'Zap' : 'Flame');
            const systemColor = primaryHeating === 'hp' ? 'text-blue-500' : (primaryHeating === 'electric' ? 'text-purple-500' : 'text-red-500');

            // --- Sub-Renders ---
            const renderLineGraph = () => {
                const innerWidth = GRAPH_WIDTH - GRAPH_PADDING.left - GRAPH_PADDING.right, innerHeight = GRAPH_HEIGHT - GRAPH_PADDING.top - GRAPH_PADDING.bottom;
                const yMax = Math.max(effectiveElecPrice / activeCurve[0].cop, oilCostAtEfficiency(efficiency), gasCostAtEfficiency(efficiency), propaneCostAtEfficiency(efficiency)) * 1.1;
                const mapX = (t) => GRAPH_PADDING.left + ((t - X_MIN) / (X_MAX - X_MIN)) * innerWidth;
                const mapY = (c) => GRAPH_PADDING.top + innerHeight - (c / yMax) * innerHeight;
                const createPath = (key) => graphData_Across.map((d, i) => (i === 0 ? 'M' : 'L') + ` ${mapX(d.temp)} ${mapY(d[key])}`).join(' ');
                return (
                    <svg ref={svgRef} viewBox={`0 0 ${GRAPH_WIDTH} ${GRAPH_HEIGHT}`} className="w-full h-full text-xs overflow-visible touch-none font-sans" onPointerMove={(e) => isDragging && handleDrag(e.clientX)} onPointerUp={() => setIsDragging(false)} onPointerLeave={() => setIsDragging(false)}>
                        {[0, 0.25, 0.5, 0.75, 1].map(r => (
                            <g key={r}><line x1={GRAPH_PADDING.left} y1={mapY(yMax*r)} x2={GRAPH_WIDTH-GRAPH_PADDING.right} y2={mapY(yMax*r)} className="stroke-slate-200 dark:stroke-slate-700" strokeDasharray="4 4"/><text x={GRAPH_PADDING.left-10} y={mapY(yMax*r)+4} textAnchor="end" className="fill-slate-500 font-medium">${(yMax*r).toFixed(2)}</text></g>
                        ))}
                        {[-20, -10, 0, 10, 20, 30, 40, 50, 60].map(t => (
                            <g key={t}><line x1={mapX(t)} y1={GRAPH_PADDING.top+innerHeight} x2={mapX(t)} y2={GRAPH_PADDING.top+innerHeight+5} className="stroke-slate-300 dark:stroke-slate-600"/><text x={mapX(t)} y={GRAPH_PADDING.top+innerHeight+20} textAnchor="middle" className="fill-slate-500 font-medium">{t}°F</text></g>
                        ))}
                        <g className="cursor-ew-resize" onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); setIsDragging(true); handleDrag(e.clientX); }}>
                            <line x1={mapX(outTemp)} y1={GRAPH_PADDING.top} x2={mapX(outTemp)} y2={GRAPH_PADDING.top+innerHeight} className="stroke-transparent stroke-[24px]"/><line x1={mapX(outTemp)} y1={GRAPH_PADDING.top} x2={mapX(outTemp)} y2={GRAPH_PADDING.top+innerHeight} className={`stroke-2 ${isDragging ? 'stroke-blue-500' : 'stroke-slate-400 dark:stroke-slate-500'}`} strokeDasharray="6 6"/><rect x={mapX(outTemp)-6} y={GRAPH_PADDING.top+innerHeight/2-12} width={12} height={24} rx={4} className={`${isDragging ? 'fill-blue-500' : 'fill-slate-400'}`}/><text x={mapX(outTemp)} y={GRAPH_PADDING.top-5} textAnchor="middle" className="font-bold fill-slate-600 dark:fill-slate-300 select-none">{outTemp}°F</text>
                        </g>
                        <path d={createPath('gas')} fill="none" className="stroke-red-500" strokeWidth="3" strokeLinejoin="round"/><path d={createPath('oil')} fill="none" className="stroke-slate-500" strokeWidth="3" strokeLinejoin="round"/><path d={createPath('propane')} fill="none" className="stroke-orange-500" strokeWidth="3" strokeLinejoin="round"/><path d={createPath('hp')} fill="none" className="stroke-blue-500" strokeWidth="4" strokeLinejoin="round"/>
                    </svg>
                );
            };

            const renderBinGraph = () => {
                const width = 800, height = 280, padding = { top: 55, right: 30, bottom: 50, left: 60 };
                const innerWidth = width - padding.left - padding.right, innerHeight = height - padding.top - padding.bottom;
                const visualBinData = binData;

                const yMax = Math.max(100, Math.max(...visualBinData.map(d => d.hours)) * 1.1);
                const mapX = (t) => padding.left + ((t - (-20)) / (75 - (-20))) * innerWidth;
                const mapY = (h) => padding.top + innerHeight - (h / yMax) * innerHeight;
                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full text-xs overflow-visible font-sans">
                        {[0, 0.5, 1].map(r => (
                            <g key={r}><line x1={padding.left} y1={mapY(yMax*r)} x2={width-padding.right} y2={mapY(yMax*r)} className="stroke-slate-200 dark:stroke-slate-700" strokeDasharray="4 4"/><text x={padding.left-10} y={mapY(yMax*r)+4} textAnchor="end" className="fill-slate-500">{Math.round(yMax*r)}h</text></g>
                        ))}
                        {[-20, 0, 20, 40, 60].map(t => (
                            <g key={t}>
                                <line x1={mapX(t)} y1={padding.top + innerHeight} x2={mapX(t)} y2={padding.top + innerHeight + 5} className="stroke-slate-300 dark:stroke-slate-600" />
                                <text x={mapX(t)} y={padding.top + innerHeight + 20} textAnchor="middle" className="fill-slate-500">{t}°F</text>
                            </g>
                        ))}
                        {visualBinData.map(d => d.hours > 0 && <rect key={d.temp} x={mapX(d.temp-0.5)} y={mapY(d.hours)} width={Math.max(1, mapX(1)-mapX(0)-1)} height={mapY(0)-mapY(d.hours)} className="fill-blue-200 dark:fill-blue-900/60 hover:fill-blue-400 transition-colors"/>)}
                        
                        <line x1={mapX(heatingSetpoint)} y1={padding.top} x2={mapX(heatingSetpoint)} y2={padding.top+innerHeight} className="stroke-slate-300 dark:stroke-slate-600 stroke-1" strokeDasharray="2 2"/>
                        <text x={mapX(heatingSetpoint)} y={10} textAnchor="middle" className="fill-slate-400 text-[10px]">Setpoint ({heatingSetpoint}°F)</text>
                        
                        <line x1={mapX(balancePoint)} y1={padding.top} x2={mapX(balancePoint)} y2={padding.top+innerHeight} className="stroke-orange-500 stroke-2" strokeDasharray="4 4"/>
                        <text x={mapX(balancePoint)} y={22} textAnchor="middle" className="fill-orange-600 font-bold text-[10px]">HVAC Balance Point ({Math.round(balancePoint)}°F)</text>

                        {/* Original Gas/Oil Balance points from bin graph */}
                        {typeof hpVsGasBalance === 'number' && hpVsGasBalance > -20 && (
                            <g>
                                <line x1={mapX(hpVsGasBalance)} y1={padding.top} x2={mapX(hpVsGasBalance)} y2={padding.top+innerHeight} className="stroke-red-500 stroke-2 opacity-50" strokeDasharray="4 4"/>
                                <text x={mapX(hpVsGasBalance)} y={34} textAnchor="middle" className="fill-red-600 dark:fill-red-400 font-bold text-[10px]">Gas cheaper &lt; {hpVsGasBalance}°F</text>
                            </g>
                        )}

                        {typeof hpVsOilBalance === 'number' && hpVsOilBalance > -20 && (
                            <g>
                                <line x1={mapX(hpVsOilBalance)} y1={padding.top} x2={mapX(hpVsOilBalance)} y2={padding.top+innerHeight} className="stroke-slate-500 stroke-2 opacity-50" strokeDasharray="4 4"/>
                                <text x={mapX(hpVsOilBalance)} y={46} textAnchor="middle" className="fill-slate-600 dark:fill-slate-400 font-bold text-[10px]">Oil cheaper &lt; {hpVsOilBalance}°F</text>
                            </g>
                        )}

                        {typeof hpVsPropaneBalance === 'number' && hpVsPropaneBalance > -20 && (
                            <g>
                                <line x1={mapX(hpVsPropaneBalance)} y1={padding.top} x2={mapX(hpVsPropaneBalance)} y2={padding.top+innerHeight} className="stroke-orange-500 stroke-2 opacity-50" strokeDasharray="4 4"/>
                                <text x={mapX(hpVsPropaneBalance)} y={58} textAnchor="middle" className="fill-orange-600 dark:fill-orange-400 font-bold text-[10px]">Propane cheaper &lt; {hpVsPropaneBalance}°F</text>
                            </g>
                        )}
                    </svg>
                );
            };

            const renderAssumptionGraph = (type) => {
                const width = 400, height = 180, padding = { top: 15, right: 10, bottom: 40, left: 55 };
                const innerWidth = width - padding.left - padding.right, innerHeight = height - padding.top - padding.bottom;
                const mapX = (t) => padding.left + ((t - X_MIN) / (X_MAX - X_MIN)) * innerWidth;
                const yLimit = type === 'cop' ? 6 : 35;
                const mapY = (v) => padding.top + innerHeight - (v / yLimit) * innerHeight;
                const points = [];
                for(let t = X_MIN; t <= X_MAX; t += 5) {
                    const v = type === 'cop' ? getCOP(t, activeCurve) : getLoadAtTemp(t, currentUA, heatingSetpoint);
                    points.push(`${t === X_MIN ? 'M' : 'L'} ${mapX(t)} ${mapY(v)}`);
                }
                const ticks = type === 'cop' ? [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6] : [0, 5, 10, 15, 20, 25, 30, 35];
                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full text-[10px] overflow-visible font-sans">
                        {ticks.map(v => (
                            <g key={v}>
                                <line x1={padding.left} y1={mapY(v)} x2={width-padding.right} y2={mapY(v)} className="stroke-slate-200 dark:stroke-slate-700" strokeDasharray="2 2"/>
                                <text x={padding.left-5} y={mapY(v)+3} textAnchor="end" className="fill-slate-500">{type === 'cop' ? v.toFixed(1) : v + 'kW'}</text>
                            </g>
                        ))}
                        {[-20, 0, 20, 40, 60].map(t => <text key={t} x={mapX(t)} y={padding.top + innerHeight + 18} textAnchor="middle" className="fill-slate-500">{t}°F</text>)}
                        <path d={points.join(' ')} fill="none" className={type === 'cop' ? "stroke-blue-500" : "stroke-orange-500"} strokeWidth="2" strokeLinejoin="round"/>
                    </svg>
                );
            };

            const renderImpactGraph = () => {
                const width = 800, height = 690, padding = { top: 55, right: 70, bottom: 60, left: 60 };
                const innerWidth = width - padding.left - padding.right;
                const topPaneHeight = 300;
                const paneGap = 40; 
                const bottomPaneHeight = 200;
                
                const visualBinData = binData;

                const yMaxHours = Math.max(100, Math.max(...visualBinData.map(d => d.hours)) * 1.1);
                const yMaxKw = 35;
                
                // Calculate kWh data
                const baselineForUpgrades = changeSetpoint ? upgradedSetpoint : heatingSetpoint;
                const setpointEffective = useSmartThermostat ? baselineForUpgrades - (2 * awayHours / 24) : baselineForUpgrades;
                
                const kwhData = visualBinData.map(d => {
                    const baseLoad = getLoadAtTemp(d.temp, currentUA, heatingSetpoint);
                    const upLoad = getLoadAtTemp(d.temp, upgradedUA, setpointEffective);
                    return {
                        temp: d.temp,
                        baseKwh: d.hours * baseLoad,
                        upKwh: d.hours * upLoad
                    };
                });
                
                const yMaxKwh = Math.max(10, Math.max(...kwhData.map(d => d.baseKwh)) * 1.1);

                const mapX = (t) => padding.left + ((t - (-20)) / (75 - (-20))) * innerWidth;
                const mapYHours = (h) => padding.top + topPaneHeight - (h / yMaxHours) * topPaneHeight;
                const mapYKw = (kw) => padding.top + topPaneHeight - (kw / yMaxKw) * topPaneHeight;
                
                // Inverted Y axis for kWh, correctly starting AFTER the gap
                const mapYKwh = (kwh) => padding.top + topPaneHeight + paneGap + (kwh / yMaxKwh) * bottomPaneHeight;

                const upgradedBalancePoint = setpointEffective - ((internalGains / 1000) / upgradedUA);

                const baseLoadPoints = [];
                const upgradedLoadPoints = [];
                for(let t = -20; t <= 75; t += 5) {
                    const baseKw = getLoadAtTemp(t, currentUA, heatingSetpoint);
                    const upKw = getLoadAtTemp(t, upgradedUA, setpointEffective);
                    baseLoadPoints.push(`${t === -20 ? 'M' : 'L'} ${mapX(t)} ${mapYKw(baseKw)}`);
                    upgradedLoadPoints.push(`${t === -20 ? 'M' : 'L'} ${mapX(t)} ${mapYKw(upKw)}`);
                }

                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto text-xs overflow-visible font-sans">
                        {/* --- TOP PANE: Hours & kW --- */}
                        {[0, 0.5, 1].map(r => (
                            <g key={`y-left-${r}`}>
                                <line x1={padding.left} y1={mapYHours(yMaxHours*r)} x2={width-padding.right} y2={mapYHours(yMaxHours*r)} className="stroke-slate-200 dark:stroke-slate-700" strokeDasharray="4 4"/>
                                <text x={padding.left-10} y={mapYHours(yMaxHours*r)+4} textAnchor="end" className="fill-slate-500 font-bold">{Math.round(yMaxHours*r)}h</text>
                            </g>
                        ))}
                        {[0, 10, 20, 30].map(kw => (
                            <g key={`y-right-${kw}`}>
                                <text x={width - padding.right + 10} y={mapYKw(kw)+4} textAnchor="start" className="fill-orange-500 font-medium">{kw} kW</text>
                            </g>
                        ))}

                        {/* Bars: Frequency (Hours) */}
                        {visualBinData.map(d => d.hours > 0 && (
                            <rect key={`hr-${d.temp}`} x={mapX(d.temp-0.5)} y={mapYHours(d.hours)} width={Math.max(1, mapX(1)-mapX(0)-1)} height={mapYHours(0)-mapYHours(d.hours)} className="fill-blue-400 dark:fill-blue-700 opacity-60"/>
                        ))}

                        {/* Curves: Load (kW) */}
                        <path d={baseLoadPoints.join(' ')} fill="none" className="stroke-orange-500 opacity-20" strokeWidth="1.5" strokeDasharray="4 2" strokeLinejoin="round"/>
                        <path d={upgradedLoadPoints.join(' ')} fill="none" className="stroke-orange-500" strokeWidth="2.5" strokeDasharray="6 3" strokeLinejoin="round"/>

                        {/* --- BOTTOM PANE: Energy (kWh) --- */}
                        {(() => {
                            const ticks = [];
                            for (let v = 250; v < yMaxKwh; v += 250) ticks.push(v);
                            return [0, ...ticks].map(v => (
                                <g key={`y-kwh-grid-${v}`}>
                                    <line x1={padding.left} y1={mapYKwh(v)} x2={width-padding.right} y2={mapYKwh(v)} className="stroke-slate-200 dark:stroke-slate-700" strokeDasharray="2 2"/>
                                    <text x={width - padding.right + 10} y={mapYKwh(v)+4} textAnchor="start" className="fill-emerald-600 dark:fill-emerald-400 font-medium">{v} kWh</text>
                                </g>
                            ));
                        })()}

                        {/* Bars: Energy (kWh) */}
                        {kwhData.map(d => d.baseKwh > 0 && (
                            <g key={`kwh-group-${d.temp}`}>
                                {/* Baseline (Background) */}
                                <rect x={mapX(d.temp-0.4)} y={padding.top + topPaneHeight + paneGap} width={Math.max(1, mapX(1)-mapX(0)-0.8)} height={mapYKwh(d.baseKwh)-(padding.top + topPaneHeight + paneGap)} className="fill-slate-300 dark:fill-slate-700"/>
                                {/* Upgraded (Foreground) */}
                                {d.upKwh > 0 && (
                                    <rect x={mapX(d.temp-0.4)} y={padding.top + topPaneHeight + paneGap} width={Math.max(1, mapX(1)-mapX(0)-0.8)} height={mapYKwh(d.upKwh)-(padding.top + topPaneHeight + paneGap)} className="fill-emerald-500 dark:fill-emerald-600"/>
                                )}
                            </g>
                        ))}

                        {/* --- SHARED ELEMENTS --- */}
                        {/* Pane Borders */}
                        <line x1={padding.left} y1={padding.top + topPaneHeight} x2={width-padding.right} y2={padding.top+topPaneHeight} className="stroke-slate-300 dark:stroke-slate-600" />
                        <line x1={padding.left} y1={padding.top + topPaneHeight + paneGap} x2={width-padding.right} y2={padding.top+topPaneHeight + paneGap} className="stroke-slate-300 dark:stroke-slate-600" />
                        
                        {/* X-Axis Labels (Centered in Gutter) */}
                        {[-20, 0, 20, 40, 60].map(t => (
                            <g key={`x-${t}`}>
                                <line x1={mapX(t)} y1={padding.top + topPaneHeight} x2={mapX(t)} y2={padding.top + topPaneHeight + 5} className="stroke-slate-300 dark:stroke-slate-600" />
                                <line x1={mapX(t)} y1={padding.top + topPaneHeight + paneGap - 5} x2={mapX(t)} y2={padding.top + topPaneHeight + paneGap} className="stroke-slate-300 dark:stroke-slate-600" />
                                <text x={mapX(t)} y={padding.top + topPaneHeight + (paneGap / 2) + 4} textAnchor="middle" className="fill-slate-500 font-bold text-sm">{t}°F</text>
                            </g>
                        ))}

                        {/* Vertical Indicators */}
                        <line x1={mapX(setpointEffective)} y1={padding.top} x2={mapX(setpointEffective)} y2={padding.top + topPaneHeight + paneGap + bottomPaneHeight} className="stroke-slate-300 dark:stroke-slate-600 stroke-1" strokeDasharray="2 2"/>
                        <text x={mapX(setpointEffective)} y={10} textAnchor="middle" className="fill-slate-400 text-[10px]">Setpoint ({Math.round(setpointEffective)}°F)</text>
                        
                        <line x1={mapX(upgradedBalancePoint)} y1={padding.top} x2={mapX(upgradedBalancePoint)} y2={padding.top + topPaneHeight + paneGap + bottomPaneHeight} className="stroke-red-400 stroke-2" strokeDasharray="4 4"/>
                        <text x={mapX(upgradedBalancePoint)} y={22} textAnchor="middle" className="fill-red-400 font-bold text-[10px]">Balance Point ({Math.round(upgradedBalancePoint)}°F)</text>

                        {/* Legend - Two Lines */}
                        <g transform={`translate(${padding.left}, ${height - 45})`}>
                            {/* Line 1: Energy Usage */}
                            <g>
                                <rect width={10} height={10} className="fill-slate-300 dark:fill-slate-700" rx={2}/>
                                <text x={15} y={9} className="fill-slate-500 text-[9px] font-bold uppercase">Baseline Energy Usage</text>
                                
                                <rect x={145} width={10} height={10} className="fill-emerald-500 dark:fill-emerald-600" rx={2}/>
                                <text x={160} y={9} className="fill-emerald-600 dark:fill-emerald-400 text-[9px] font-bold uppercase">Upgraded Energy Usage</text>
                            </g>
                            {/* Line 2: Heating Metrics */}
                            <g transform="translate(0, 18)">
                                <rect width={10} height={10} className="fill-blue-400 dark:fill-blue-700" rx={2}/>
                                <text x={15} y={9} className="fill-blue-500 text-[9px] font-bold uppercase">Heating Hours</text>

                                <line x1={100} y1={5} x2={115} y2={5} className="stroke-orange-500 opacity-40" strokeWidth="2" strokeDasharray="2 1"/>
                                <text x={120} y={9} className="fill-orange-600 opacity-60 text-[9px] font-bold uppercase">Heat Power Needed</text>

                                <line x1={240} y1={5} x2={255} y2={5} className="stroke-orange-500" strokeWidth="2" strokeDasharray="4 2"/>
                                <text x={260} y={9} className="fill-orange-600 text-[9px] font-bold uppercase">Upgraded Heat Power Needed</text>
                            </g>
                        </g>
                    </svg>
                );
            };

            const dataSourcesCard = (
                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 text-sm mb-8 mx-4 md:mx-0 animate-in fade-in duration-500">
                    <h2 className="text-xl font-bold dark:text-white mb-4">Data Sources & Assumptions</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-slate-600 dark:text-slate-400">
                        <div className="space-y-3">
                            <h3 className="font-bold text-slate-800 dark:text-slate-200 uppercase text-xs tracking-widest font-sans">Lookup Values & Rates</h3>
                            <ul className="space-y-2">
                                <li className="flex gap-2 items-start"><Icon name="ExternalLink" size={14} className="mt-1 flex-shrink-0 text-blue-500"/><p><strong>ASHRAE Fundamentals:</strong> Basis for Variable Base Degree Day (VBDD) modeling. <a href="https://www.ashrae.org/technical-resources/bookstore/handbook-of-fundamentals" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">Reference</a></p></li>
                                <li className="flex gap-2 items-start"><Icon name="ExternalLink" size={14} className="mt-1 flex-shrink-0 text-blue-500"/><p><strong>MA Rates:</strong> Eversource Seasonal Delivery Discount (~$0.073/kWh). <a href="https://www.eversource.com/residential/account-billing/manage-bill/about-your-bill/rates-tariffs/electric-delivery-rates" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">Link</a></p></li>
                                <li className="flex gap-2 items-start"><Icon name="ExternalLink" size={14} className="mt-1 flex-shrink-0 text-blue-500"/><p><strong>Climate Data:</strong> Open-Meteo ERA5 Archive (Historical 2025). <a href="https://open-meteo.com/en/docs/historical-weather-api" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">Open-Meteo API</a></p></li>                                <li className="flex gap-2 items-start"><Icon name="ExternalLink" size={14} className="mt-1 flex-shrink-0 text-blue-500"/><p><strong>National Averages:</strong> U.S. Energy Information Administration (EIA) monthly reporting. <a href="https://www.eia.gov/" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">EIA website</a></p></li>
                            </ul>
                        </div>
                        <div className="space-y-3">
                            <h3 className="font-bold text-slate-800 dark:text-slate-200 uppercase text-xs tracking-widest font-sans">Physics & Equipment</h3>
                            <ul className="space-y-2 list-disc pl-4">
                                <li><strong>Conversions:</strong> Standard physics conversions (40.6 kWh/gal for Oil, 29.3 kWh/therm for Gas, 26.8 kWh/gal for Propane).</li>                                <li><strong>Load Profile:</strong> Dynamic $UA$ (heat loss coefficient) adjusted for surface-area-to-volume ratio ($1/L$) based on house size.</li>
                                <li><strong>Internal Gains:</strong> Default internal heat generation (e.g. 600W avg) creates the Balance Point.</li>
                                <li><strong>Equipment:</strong> COP performance curves derived from the <a href="https://neep.org/heating-electrification/ccashp-specification-product-list" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">NEEP Product List</a> and <a href="https://docs.nrel.gov/docs/fy23osti/85081.pdf" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">NREL physical extrapolation</a>.</li>
                                <li><strong>Upgrades:</strong> Manual maintenance recovery modeled at a 105% efficiency gain over the degraded baseline.</li>
                                <li><strong>Manual J:</strong> For true precision, detailed load modeling should be performed at a site like <a href="https://www.coolcalc.com/" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">Cool Calc</a>.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-900 p-4 md:p-8 flex flex-col items-center font-sans transition-colors duration-200">
                    <div className="w-full max-w-5xl flex flex-col gap-6">
                        
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex flex-col md:flex-row items-center gap-4">
                                <h1 className="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                                    <Icon name="TrendingUp" className="text-blue-600" size={32} /> Heating Cost Comparator
                                </h1>
                                {cacheSize > 0 && (
                                    <div className="flex items-center gap-2 px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-[10px] font-bold text-slate-500 uppercase">
                                        <span>{cacheSize} ZIPs Cached</span>
                                        <button onClick={clearCache} className="text-red-500 hover:text-red-700 ml-1 border-l pl-2 dark:border-slate-600">Clear</button>
                                    </div>
                                )}
                            </div>
                            {currentView > 1 && (
                                <button onClick={() => {
                                    setCurrentView(1);
                                    setActiveZipCode('');
                                    setZipCode('');
                                    setLookupMessage('');
                                    setFetchedBinData(null);
                                }} className="text-sm font-bold text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 transition-colors flex items-center gap-1">
                                    <Icon name="ArrowLeft" size={16} /> Reset Configuration
                                </button>
                            )}
                        </div>

                        {/* --- VIEW 1 & 2: About My Household --- */}
                        {currentView <= 2 && (
                            <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                                <h2 className="text-xl font-bold dark:text-white mb-6 flex items-center gap-2"><Icon name="Home" size={20} className="text-slate-400"/> About my household</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <SelectControl iconName="Home" label="Home Size" value={homeSize} options={HOME_SIZE_OPTIONS} onChange={setHomeSize} colorClass="text-slate-500" />
                                    <SelectControl iconName="Shield" label="Current Insulation" value={homeInsulation} options={INSULATION_OPTIONS} onChange={setHomeInsulation} colorClass="text-emerald-500" />
                                    
                                    <SelectControl iconName={systemIcon} label="Primary Heating System" value={currentSystemVal} options={COMBINED_SYSTEM_OPTIONS} onChange={handleSystemChange} colorClass={systemColor} />
                                    <SliderControl iconName="ThermometerSnowflake" label="Heating Setpoint" value={heatingSetpoint} min={50} max={75} step={1} unit="°F" onChange={setHeatingSetpoint} colorClass="text-orange-500" />

                                    <div className="md:col-span-2">
                                        <label className="flex items-center gap-2 font-medium mb-2 dark:text-slate-200"><Icon name="MapPin" size={18} className="text-slate-500"/> Location (ZIP Code)</label>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex flex-wrap gap-2">
                                                <input type="text" value={zipCode} onChange={e => setZipCode(e.target.value)} disabled={isLoadingData} placeholder="e.g. 02138" className="w-full md:max-w-xs px-3 py-2 border rounded-lg bg-white dark:bg-slate-900 dark:text-white dark:border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none disabled:opacity-50"/>
                                                <button 
                                                    onClick={(e) => handleZipLookup(e, true, false)} 
                                                    disabled={isLoadingData || zipCode.length < 5 || (activeZipCode === zipCode.trim())} 
                                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors whitespace-nowrap font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
                                                >
                                                    {isLoadingData ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <Icon name="TrendingUp" size={18} />}
                                                    Load data
                                                </button>                                                {activeZipCode && activeZipCode === zipCode.trim() && !isLoadingData && (
                                                    <button 
                                                        onClick={(e) => handleZipLookup(e, true, true)} 
                                                        className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-lg transition-colors group" 
                                                        title="Force fresh data fetch"
                                                    >
                                                        <div className="flex items-center gap-1.5 px-1">
                                                            <Icon name="Settings" size={16} className="group-hover:rotate-180 transition-transform duration-500" />
                                                            <span className="text-xs font-bold uppercase tracking-wider">Re-fetch</span>
                                                        </div>
                                                    </button>
                                                )}                                            </div>
                                                {/* Data Status Indicators */}
                                                {activeZipCode && (
                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                        <div className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider border shadow-sm ${isUsingFallback ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                                                            <Icon name={isUsingFallback ? "Settings" : "CheckSquare"} size={10} />
                                                            Climate: {isUsingFallback ? 'Fallback Model (Regional)' : 'Loaded from Historic Data (2025)' }
                                                        </div>
                                                        <div className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider border shadow-sm ${priceSource === 'regional' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                                                            <Icon name={priceSource === 'regional' ? "Settings" : "CheckSquare"} size={10} />
                                                            Energy Rates: {priceSource === 'regional' ? 'Fallback Model (Regional)' : `Loaded from Current Monthly Data (EIA ${ZIP_TO_STATE[activeZipCode.substring(0,2)] || ''})` }
                                                        </div>
                                                    </div>
                                                )}
                                                {isLoadingData && (                                                <div className="w-full md:max-w-md mt-2">
                                                    <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
                                                        <div className="bg-blue-600 h-full transition-all duration-300 ease-out" style={{ width: `${loadProgress}%` }}></div>
                                                    </div>
                                                </div>
                                            )}
                                            {lookupMessage && <p className={`text-xs font-medium ${lookupMessage.startsWith('Error') ? 'text-red-500' : 'text-blue-500'}`}>{lookupMessage}</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- VIEW 2 ONLY: Baseline Analysis & Sanity Check --- */}
                        {currentView === 2 && (
